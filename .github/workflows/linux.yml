
name: linux Build

on:
    workflow_call:

jobs:

  build:

    runs-on: ubuntu-latest 

    env:
      Solution_Name: CRBDL.sln                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Project_Directory: dbfal
      
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Build dotnet
      run: dotnet restore -r linux-x64 && dotnet publish -c Release -r linux-x64 --self-contained true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: DBFAL-linux-x64
        path: |
          ${{ env.Project_Directory }}/bin/Release/net10.0/linux-x64/publish/dbfal
          ${{ env.Project_Directory }}/bin/Release/net10.0/linux-x64/publish/*.so
