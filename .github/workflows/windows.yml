
name: Windows Build

on:
  push:
    branches: [ "Avalonia_ui" ]
  pull_request:
    branches: [ "Avalonia_ui" ]

jobs:

  build:

    runs-on: windows-latest 

    env:
      Solution_Name: CRBDL.sln                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Project_Directory: dbfal
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Build dotnet
      run: dotnet restore -r win-x64 && dotnet publish -c Release -r win-x64 --self-contained true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DBFAL-windows-x64
        path: |
          ${{ env.Project_Directory }}\bin\Release\net10.0\win-x64\publish\dbfal.exe
          ${{ env.Project_Directory }}\bin\Release\net10.0\win-x64\publish\*.dll
